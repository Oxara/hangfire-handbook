### Ne Zaman Kullan / Kullanma

| Senaryo | ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|---------|-----------|-------------|--------------|
| E-posta gönderimi | ✅ Fire-and-forget | | E-ticaret sipariş onayı |
| Rapor oluşturma | ✅ Delayed/Recurring | | Günlük satış raporu PDF |
| Dosya işleme | ✅ Long-running job | | CSV import (100K satır) |
| Basit in-memory cache refresh | | ❌ Overkill | Timer/IHostedService yeterli |
| Sub-millisecond latency | | ❌ Polling overhead | Real-time trading |
| Distributed event-driven | | ❌ Mesajlaşma sistemi kullan | RabbitMQ/Kafka daha uygun |

> ⚠️ **Hangfire vs IHostedService**: Eğer job'larınız uygulama restart'ında kaybolabilir ve persistence gerekmiyorsa, \`IHostedService\` daha basit bir çözümdür. Hangfire'ın gücü **at-least-once guarantee** ve **persistent storage** ile gelir.

> 💡 **Gerçek hayat senaryosu:** Bir e-ticaret platformunda sipariş sonrası fatura PDF oluşturma, kargo entegrasyonu çağırma ve müşteriye e-posta gönderme — üçü de fire-and-forget job olarak enqueue edilir. Kullanıcı anında "Siparişiniz alındı" görür, arka planda işlemler güvenilir şekilde tamamlanır.

> ⚠️ **Hangfire Lisanslama Uyarısı — Free vs Pro vs Ace:**
>
> | Tier | Paketler | Fiyat | Ne İçerir |
> |------|----------|-------|------------|
> | **Core** | Hangfire.Core, .AspNetCore, .SqlServer, .InMemory | ÜCRETSİZ (LGPL) | Fire-and-forget, delayed, recurring, continuations, dashboard, SQL storage, job filters, \`[DisableConcurrentExecution]\`, retry |
> | **Pro** | Hangfire.Pro, Hangfire.Pro.Redis | ~$500/yıl per server | **Batch jobs**, **Redis storage**, per-job retention (\`[JobExpirationTimeout]\`), perf counters |
> | **Ace** | Hangfire.Throttling | ~$1000/yıl per server | **\`[Mutex]\`**, **\`[Semaphore]\`**, fixed/sliding/dynamic window rate limiting |
>
> Bu dokümanda **💰 Pro** veya **💰 Ace** işareti gördüğünüz her yer ücretli lisans gerektirir. İşaretsiz her şey Core (ücretsiz) ile çalışır.

### Minimal Konfigürasyon (Program.cs)

\`\`\`csharp
using Hangfire;
using Hangfire.SqlServer;

var builder = WebApplication.CreateBuilder(args);

// Hangfire servislerini kaydet
builder.Services.AddHangfire(config => config
    .SetDataCompatibilityLevel(CompatibilityLevel.Version_180)
    .UseSimpleAssemblyNameTypeSerializer()
    .UseRecommendedSerializerSettings()
    .UseSqlServerStorage(builder.Configuration.GetConnectionString("HangfireConnection"), new SqlServerStorageOptions
    {
        CommandBatchMaxTimeout = TimeSpan.FromMinutes(5),
        SlidingInvisibilityTimeout = TimeSpan.FromMinutes(5),
        QueuePollInterval = TimeSpan.Zero,              // Long-polling (SlidingInvisibilityTimeout ile birlikte)
        UseRecommendedIsolationLevel = true,
        DisableGlobalLocks = true,                      // Schema 7+ gerektirir (yeni kurulumda otomatik)
        TryAutoDetectSchemaDependentOptions = true,     // 1.8: Schema'ya göre opsiyonları otomatik ayarlar
        SchemaName = "hangfire"
    }));

// Background job server'ı IHostedService olarak ekle
builder.Services.AddHangfireServer(options =>
{
    options.WorkerCount = Environment.ProcessorCount * 5; // Varsayılan (IO-bound iş yükleri için)
    options.Queues = new[] { "critical", "default", "low" };
});

var app = builder.Build();

// Dashboard — development'ta serbest, production'da auth zorunlu
if (app.Environment.IsDevelopment())
{
    app.UseHangfireDashboard("/hangfire");
}
else
{
    app.UseHangfireDashboard("/hangfire", new DashboardOptions
    {
        Authorization = new[] { new HangfireAuthorizationFilter() },
        DisplayStorageConnectionString = false
    });
}

app.Run();
\`\`\`

### Temel Kullanım

\`\`\`csharp
// En basit form — static method
BackgroundJob.Enqueue(() => Console.WriteLine("Merhaba Hangfire!"));

// Servis injection ile (önerilen)
BackgroundJob.Enqueue<IEmailService>(service => 
    service.SendOrderConfirmation(orderId));

// Queue belirterek
BackgroundJob.Enqueue<IEmailService>(
    service => service.SendOrderConfirmation(orderId),
    "critical");

### DI-Friendly Pattern (Önerilen)

\`\`\`csharp
public interface IOrderNotificationService
{
    Task SendConfirmationAsync(int orderId);
}

public class OrderNotificationService : IOrderNotificationService
{
    private readonly IEmailSender _emailSender;
    private readonly IOrderRepository _orderRepo;

    public OrderNotificationService(IEmailSender emailSender, IOrderRepository orderRepo)
    {
        _emailSender = emailSender;
        _orderRepo = orderRepo;
    }

    public async Task SendConfirmationAsync(int orderId)
    {
        var order = await _orderRepo.GetByIdAsync(orderId);
        if (order is null) return;

        await _emailSender.SendAsync(
            to: order.CustomerEmail,
            subject: "Siparişiniz onaylandı",
            body: GenerateEmailBody(order));
    }
}

// Controller'da kullanım
[HttpPost("orders")]
public IActionResult CreateOrder([FromBody] CreateOrderRequest request)
{
    var orderId = _orderService.Create(request);
    
    // Background'da çalışacak — response hemen döner
    BackgroundJob.Enqueue<IOrderNotificationService>(
        svc => svc.SendConfirmationAsync(orderId));
    
    return CreatedAtAction(nameof(GetOrder), new { id = orderId }, null);
}
\`\`\`

> ⚠️ **Argüman kuralı:** Job argümanları JSON olarak serialize edilir. **Entity nesnesi değil, ID geçin.** Büyük nesneler storage'ı şişirir ve deserialization sorunlarına yol açar.

|---------|-----------|-------------|--------------|
| Sipariş timeout (30 dk) | ✅ | | Ödenmemiş siparişi iptal et |

### Kullanım

\`\`\`csharp
// TimeSpan ile — "şu kadar sonra"
BackgroundJob.Schedule<IOrderService>(
    svc => svc.CancelUnpaidOrderAsync(orderId),
    TimeSpan.FromMinutes(30));

// DateTimeOffset ile — "bu tarihte"
BackgroundJob.Schedule<IReminderService>(
    svc => svc.SendReminderAsync(userId, "Toplantınız 1 saat sonra"),
    new DateTimeOffset(2026, 6, 15, 9, 0, 0, TimeSpan.FromHours(3)));

// Job ID döner (string) — iptal için kullanılabilir
string jobId = BackgroundJob.Schedule<IOrderService>(
    svc => svc.CancelUnpaidOrderAsync(orderId),
    TimeSpan.FromMinutes(30));

// Sipariş ödendiyse job'ı iptal et
BackgroundJob.Delete(jobId);

### Sipariş Timeout Pattern

\`\`\`csharp
public class OrderService : IOrderService
{
    private readonly IOrderRepository _repo;
    
    public async Task CancelUnpaidOrderAsync(int orderId)
    {
        var order = await _repo.GetByIdAsync(orderId);
        
        // İdempotent kontrol — zaten ödendiyse veya iptal edildiyse bir şey yapma
        if (order is null || order.Status != OrderStatus.PendingPayment)
            return;
        
        order.Status = OrderStatus.Cancelled;
        order.CancelReason = "Ödeme süresi doldu (30 dakika)";
        order.CancelledAt = DateTimeOffset.UtcNow;
        
        await _repo.UpdateAsync(order);
        
        // Stok iade
        BackgroundJob.Enqueue<IStockService>(
            svc => svc.ReleaseReservedStockAsync(orderId));
    }
}

// Sipariş oluşturulduğunda
public int CreateOrder(CreateOrderRequest request)
{
    var order = _mapper.Map<Order>(request);
    order.Status = OrderStatus.PendingPayment;
    _repo.Add(order);
    
    // 30 dk sonra kontrol et
    var jobId = BackgroundJob.Schedule<IOrderService>(
        svc => svc.CancelUnpaidOrderAsync(order.Id),
        TimeSpan.FromMinutes(30));
    
    // Job ID'yi sakla — ödeme gelirse iptal edeceğiz
    order.CancelJobId = jobId;
    _repo.Update(order);
    
    return order.Id;
}

// Ödeme geldiğinde
public void MarkAsPaid(int orderId)
{
    var order = _repo.GetById(orderId);
    order.Status = OrderStatus.Paid;
    
    // Timeout job'ını iptal et
    if (!string.IsNullOrEmpty(order.CancelJobId))
        BackgroundJob.Delete(order.CancelJobId);
    
    _repo.Update(order);
}
\`\`\`

> ⚠️ **Scheduling hassasiyeti:** Hangfire, scheduled job'ları polling ile kontrol eder. Varsayılan \`SchedulePollingInterval\` 15 saniyedir. Yani "30 dakika sonra" demek "30:00 ile 30:15 arası" anlamına gelir. Saniye hassasiyeti gerekiyorsa Hangfire doğru araç değildir.

> 💡 **Gerçek hayat senaryosu:** Bir fintech uygulamasında kredi başvurusu yapıldığında, 48 saat içinde belge yüklenmezse başvuru otomatik reddedilir. Delayed job ile bu süre yönetilir, belge yüklendiğinde job silinir.

### Ne Zaman Kullan / Kullanma

| Senaryo | ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|---------|-----------|-------------|--------------|
| Günlük rapor | ✅ | | Her gün 08:00 satış özeti |
| DB temizliği | ✅ | | Haftalık soft-delete purge |
| Health check ping | ✅ | | Her 5 dk uptime monitor |
| Event-driven tetikleme | | ❌ Mesaj kuyruğu kullan | Sipariş gelince stok düş |
| Gerçek zamanlı stream | | ❌ Cron uygun değil | WebSocket push |

### CRON İfadeleri

| İfade | Anlamı | Hangfire Helper |
|-------|--------|-----------------|
| \`* * * * *\` | Her dakika | \`Cron.Minutely\` |
| \`0 * * * *\` | Her saat başı | \`Cron.Hourly\` |
| \`0 9 * * *\` | Her gün 09:00 | \`Cron.Daily(9)\` |
| \`0 9 * * 1-5\` | Hafta içi 09:00 | \`Cron.Daily(9) + custom\` |
| \`0 0 * * 0\` | Her Pazar gece yarısı | \`Cron.Weekly\` |
| \`0 0 1 * *\` | Ayın 1'i gece yarısı | \`Cron.Monthly\` |

### Kullanım

\`\`\`csharp
// Program.cs veya Startup'ta
RecurringJob.AddOrUpdate<IDailyReportService>(
    "daily-sales-report",           // Unique job ID
    svc => svc.GenerateAsync(),
    Cron.Daily(9),                  // Her gün 09:00 UTC
    new RecurringJobOptions
    {
        TimeZone = TimeZoneInfo.FindSystemTimeZoneById("Turkey Standard Time")
    });

RecurringJob.AddOrUpdate<IDbMaintenanceService>(
    "weekly-purge-deleted",
    svc => svc.PurgeSoftDeletedAsync(TimeSpan.FromDays(30)),
    "0 3 * * 0",                   // Her Pazar 03:00
    new RecurringJobOptions
    {
        TimeZone = TimeZoneInfo.FindSystemTimeZoneById("Turkey Standard Time"),
        MisfireHandling = MisfireHandlingMode.Ignorable
    });

// Job'ı kaldır
RecurringJob.RemoveIfExists("daily-sales-report");

// Hemen tetikle (bir sonraki schedule'ı beklemeden)
RecurringJob.TriggerJob("daily-sales-report");
\`\`\`

### MisfireHandling

Uygulama kapalıyken bir recurring job'ın zamanı geçerse ne olur?

| Mod | Davranış | Kullanım |
|-----|----------|----------|
| \`Relaxed\` (varsayılan) | Kaçırılan job çalıştırılır | Rapor, bildirim — "geç de olsa çalışsın" |
| \`Ignorable\` | Kaçırılan job atlanır | Monitoring ping — eski veri anlamsız |
| \`Strict\` | Kaçırılan her instance çalıştırılır | Fatura kesilmesi — hiçbiri atlanmamalı |

> ⚠️ **TimeZone uyarısı:** Varsayılan UTC'dir. Türkiye'de sabah 9'da çalışmasını istiyorsanız mutlaka \`TimeZone\` parametresi verin. Aksi halde UTC 09:00 = Türkiye 12:00 olur.

> ⚠️ **Eş zamanlı çalışma riski:** Recurring job'un bir önceki instance'ı henüz bitmeden yeni instance tetiklenebilir (uzun süren job + kısa cron aralığı). Önlemek için \`[DisableConcurrentExecution(timeoutInSeconds: 300)]\` attribute'ü ekleyin — bu, aynı job'ın aynı anda birden fazla instance'ının çalışmasını engeller. (**Core — ücretsiz**)
>
> 💰 **Ace alternatifi:** Daha gelişmiş concurrency control istiyorsanız (dinamik resource-based locking, semaphore ile N-concurrent limit, rate limiting): \`Hangfire.Throttling\` paketi (💰 Ace lisansı) → \`[Mutex("job-key")]\`, \`[Semaphore("pool", limit: 5)]\`. Fark: \`DisableConcurrentExecution\` distributed lock tutar (timeout'a kadar bloklar), \`[Mutex]\` ise job'u reschedule eder (worker'ı bloklamaz).

> 💡 **Gerçek hayat senaryosu:** Bir SaaS uygulamasında her tenant için ayrı recurring job tanımlanır: \`daily-report-tenant-{tenantId}\`. Böylece her müşterinin raporu kendi timezone'unda doğru saatte oluşturulur. Tenant silindiğinde \`RemoveIfExists\` ile job da temizlenir.

> 🔗 **İlgili:** [Delayed Jobs](#delayed-jobs) · [Performance & Scaling](#performance--scaling) · [Best Practices](#best-practices--anti-patterns)

### Continuation Kullanımı

\`\`\`csharp
// Basit continuation
var jobId = BackgroundJob.Enqueue<IOrderService>(
    svc => svc.ValidateOrderAsync(orderId));

BackgroundJob.ContinueJobWith<IPaymentService>(jobId,
    svc => svc.ChargeCustomerAsync(orderId));

// Zincirleme continuation (pipeline)
var validateId = BackgroundJob.Enqueue<IOrderService>(
    svc => svc.ValidateOrderAsync(orderId));

var chargeId = BackgroundJob.ContinueJobWith<IPaymentService>(validateId,
    svc => svc.ChargeCustomerAsync(orderId));

var shipId = BackgroundJob.ContinueJobWith<IShippingService>(chargeId,
    svc => svc.InitiateShipmentAsync(orderId));

BackgroundJob.ContinueJobWith<INotificationService>(shipId,
    svc => svc.SendOrderShippedAsync(orderId));
\`\`\`

### Batch Jobs (💰 Hangfire Pro — Ücretli Lisans Gerektirir)

> ⚠️ **Bu bölüm ücretli \`Hangfire.Pro\` NuGet paketi gerektirir.** Community (ücretsiz) sürümde \`BatchJob\` sınıfı YOKTUR. Eklemeye çalışırsanız derleme hatası alırsınız. Fiyatlandırma: [hangfire.io/pricing](https://www.hangfire.io/pricing/)

\`\`\`csharp
// Program.cs — Batch'leri aktifleştirme (Pro lisans sonrası)
builder.Services.AddHangfire(config => config
    .UseSqlServerStorage(connectionString)
    .UseBatches()      // ⚠️ Hangfire.Pro paketi gerekli!
    .UseBatchesV2());  // İsteğe bağlı: gelişmiş batch özellikleri
\`\`\`

\`\`\`csharp
// Atomik batch — hepsi birlikte oluşturulur
var batchId = BatchJob.StartNew(batch =>
{
    batch.Enqueue<IImageService>(svc => svc.ResizeAsync(imageId, "thumb"));
    batch.Enqueue<IImageService>(svc => svc.ResizeAsync(imageId, "medium"));
    batch.Enqueue<IImageService>(svc => svc.ResizeAsync(imageId, "large"));
});

// Batch tamamlandığında continuation
BatchJob.ContinueBatchWith(batchId, batch =>
{
    batch.Enqueue<ICdnService>(svc => svc.InvalidateCacheAsync(imageId));
});
\`\`\`

> 💡 **Ücretsiz alternatif:** Batch ihtiyacınız basitse (paralel değil sıralı), continuation chain ile aynı sonucu Core ile elde edebilirsiniz. Batch'in farkı: atomik oluşturma + paralel çalışma + toplu completion callback.

### JobContinuationOptions

\`\`\`csharp
// Varsayılan: Sadece parent Succeeded olunca çalış
BackgroundJob.ContinueJobWith<INotificationService>(parentId,
    svc => svc.NotifyAsync(orderId),
    JobContinuationOptions.OnlyOnSucceededState);  // default

// Parent başarısız olsa bile çalış (cleanup logic)
BackgroundJob.ContinueJobWith<ICleanupService>(parentId,
    svc => svc.ReleaseLocksAsync(orderId),
    JobContinuationOptions.OnAnyFinishedState);  // Succeeded VEYA Failed
\`\`\`

| Option | Tetiklenme | Kullanım |
|--------|-----------|----------|
| \`OnlyOnSucceededState\` (default) | Parent succeeded | Normal pipeline |
| \`OnAnyFinishedState\` | Parent succeeded VEYA failed | Cleanup, resource release |

> ⚠️ **Continuation dikkat noktası:** Parent job başarısız olursa (varsayılan ayarla) continuation tetiklenmez. Retry sonrası başarılı olursa tetiklenir. Parent \`Deleted\` state'e geçerse continuation da silinir. Cleanup gereken durumlarda \`OnAnyFinishedState\` kullanın.

> 💡 **Gerçek hayat senaryosu:** Bir medya platformunda video yükleme pipeline'ı: Upload → Transcode (480p, 720p, 1080p batch) → Thumbnail → CDN Push → Notify User. Her adım bağımsız retry'a sahip ve tüm batch bitince kullanıcı bilgilendirilir.

| \`IClientFilter\` | Job oluşturulurken (Enqueue) | Validation, logging, tenant tagging |
| \`IServerFilter\` | Job execute edilirken | Timing, try/catch, distributed lock |
| \`IElectStateFilter\` | State değiştirilirken | Custom retry logic, alerting |
| \`IApplyStateFilter\` | State uygulandıktan sonra | Metrics, notification |

### Ne Zaman Kullan / Kullanma

| Senaryo | ✅ Kullan | ❌ Kullanma | Gerçek Hayat |
|---------|-----------|-------------|--------------|
| Cross-cutting logging | ✅ IServerFilter | | Tüm job'lara execution time ekle |
| Retry özelleştirme | ✅ IElectStateFilter | | Kalıcı hata ayrımı |
| Tenant context propagation | ✅ IClientFilter + IServerFilter | | Multi-tenant SaaS |
| Basit try/catch | | ❌ Filter overkill | Tek job'a özel hata yakalama |
| DB transaction yönetimi | | ❌ Job içinde yap | Unit of work pattern |

### Custom Filter: Execution Time Logger

\`\`\`csharp
public class LogExecutionTimeAttribute : JobFilterAttribute, IServerFilter
{
    // NOT: Filter attribute'lar DI almaz! Serilog static Log kullanın
    // veya GlobalJobFilters yerine IoC-based filter activation kullanın.
    
    public void OnPerforming(PerformingContext context)
    {
        context.Items["StartTime"] = Stopwatch.StartNew();
    }

    public void OnPerformed(PerformedContext context)
    {
        if (context.Items.TryGetValue("StartTime", out var obj) && obj is Stopwatch sw)
        {
            sw.Stop();
            var jobName = context.BackgroundJob.Job.Type.Name + "." + 
                          context.BackgroundJob.Job.Method.Name;
            
            // Structured logging
            Log.Information("Job {JobName} completed in {ElapsedMs}ms. JobId: {JobId}",
                jobName, sw.ElapsedMilliseconds, context.BackgroundJob.Id);

            // Slow job alert
            if (sw.ElapsedMilliseconds > 30000)
            {
                Log.Warning("SLOW JOB: {JobName} took {ElapsedMs}ms (threshold: 30s)",
                    jobName, sw.ElapsedMilliseconds);
            }
        }
    }
}

// Kullanım — method seviyesinde
[LogExecutionTime]
public async Task ProcessLargeImportAsync(int importId) { ... }

// Veya global registration
GlobalJobFilters.Filters.Add(new LogExecutionTimeAttribute());
\`\`\`

// Default: 10 retry, exponential backoff

}

// Başarısız olunca silme yerine bekletme

public async Task ProcessWebhookAsync(int webhookId) { ... }

### Tenant Isolation Filter

\`\`\`csharp
public class TenantFilterAttribute : JobFilterAttribute, IClientFilter, IServerFilter
{
    public void OnCreating(CreatingContext context)
    {
        // Job oluşturulurken mevcut tenant'ı kaydet
        var tenantId = TenantContext.CurrentTenantId;
        context.SetJobParameter("TenantId", tenantId);
    }

    public void OnCreated(CreatedContext context) { }

    public void OnPerforming(PerformingContext context)
    {
        // Job çalışırken tenant context'i restore et
        var tenantId = context.GetJobParameter<string>("TenantId");
        TenantContext.SetCurrentTenant(tenantId);
    }

    public void OnPerformed(PerformedContext context)
    {
        TenantContext.Clear();
    }
}
\`\`\`

> 💡 **Gerçek hayat senaryosu:** Multi-tenant SaaS'ta her background job kendi tenant'ının DB connection string'ini kullanmalıdır. TenantFilter ile job oluşturulurken tenant ID kaydedilir, execute sırasında doğru connection string inject edilir.

### Retry Stratejileri

\`\`\`csharp
// 1. Varsayılan: 10 deneme, otomatik exponential backoff
// Bekleme: ~30s, 1m, 2m, 5m, 10m, 20m, 30m, 1h, 2h, 4h

// 2. Custom delays
[AutomaticRetry(Attempts = 5, DelaysInSeconds = new[] { 30, 120, 600, 3600, 14400 })]
public async Task CallExternalApiAsync(int requestId) { ... }

// 3. Belirli exception'larda retry'ı atla (1.8.15+ ExceptOn)
[AutomaticRetry(Attempts = 5, ExceptOn = new[] { typeof(ValidationException), typeof(ArgumentException) })]
public async Task ProcessOrderAsync(int orderId) { ... }
// ValidationException veya ArgumentException fırlatılırsa retry YAPILMAZ, direkt Failed state.
// SmartRetryFilter yazmadan native çözüm!

// 4. Retry yok — idempotent olmayan kritik iş
[AutomaticRetry(Attempts = 0)]
public async Task DebitAccountAsync(int transactionId) { ... }

// 5. Başarısız olunca Failed state'te bekle (dashboard'da görünsün)
[AutomaticRetry(Attempts = 3, OnAttemptsExceeded = AttemptsExceededAction.Fail)]
public async Task ImportDataAsync(int batchId) { ... }

// 6. Başarısız olunca sil (önemsiz job)
[AutomaticRetry(Attempts = 3, OnAttemptsExceeded = AttemptsExceededAction.Delete)]
public async Task SendAnalyticsAsync(int eventId) { ... }
\`\`\`

### Exception-Based Retry Control

> 💡 **1.8.15+ kullanıyorsanız:** Basit "bu exception'da retry yapma" senaryoları için yukarıdaki \`ExceptOn\` property yeterlidir. Aşağıdaki \`SmartRetryFilter\` yaklaşımı, **daha karmaşık logic** gerektiğinde kullanılır (rate limit → custom schedule, conditional retry, logging).

\`\`\`csharp
public class SmartRetryFilter : JobFilterAttribute, IElectStateFilter
{
    public void OnStateElection(ElectStateContext context)
    {
        if (context.CandidateState is FailedState failedState)
        {
            // Kalıcı hatalar için retry'ı durdur
            // AutomaticRetry filter'dan ÖNCE çalışması için Order ayarla
            if (failedState.Exception is ValidationException or
                ArgumentException or
                UnauthorizedAccessException)
            {
                // DeletedState ile retry tamamen engellenir
                // FailedState atarsanız AutomaticRetry yine retry yapar!
                context.CandidateState = new DeletedState
                {
                    Reason = "Permanent failure: " + failedState.Exception.GetType().Name
                };
                return;
            }

            // Rate limit: retry'ı manual schedule et
            if (failedState.Exception is RateLimitException rle)
            {
                var delay = TimeSpan.FromSeconds(rle.RetryAfterSeconds);
                context.CandidateState = new ScheduledState(delay)
                {
                    Reason = $"Rate limited, retrying after {rle.RetryAfterSeconds}s"
                };
            }
        }
    }
}

// Registration — Order önemli! SmartRetry, AutomaticRetry'dan önce çalışmalı
GlobalJobFilters.Filters.Add(new SmartRetryFilter(), order: 0);
\`\`\`

### Global Retry Policy

\`\`\`csharp
// Program.cs'de global ayar
builder.Services.AddHangfire(config =>
{
    config.UseFilter(new AutomaticRetryAttribute
    {
        Attempts = 5,
        DelaysInSeconds = new[] { 60, 300, 900, 3600, 7200 },
        OnAttemptsExceeded = AttemptsExceededAction.Fail
    });
});
\`\`\`

> ⚠️ **Idempotency zorunludur:** Hangfire "at-least-once" garantisi verir. Aynı job birden fazla kez çalışabilir (retry, server crash). Job'larınızı mutlaka idempotent tasarlayın — aynı giriş ile aynı sonuç, yan etki tekrarı yok.

> 💡 **Gerçek hayat senaryosu:** Payment gateway entegrasyonunda, ödeme isteği gönderildi ama response timeout oldu. Job retry eder — ama gateway'e idempotency key göndererek aynı ödemenin tekrar çekilmesini önler. Gateway "already processed" döner, job succeeded olarak kapanır.

### Authorization Filter (Cookie/JWT)

\`\`\`csharp
public class HangfireAuthorizationFilter : IDashboardAuthorizationFilter
{
    public bool Authorize(DashboardContext context)
    {
        var httpContext = context.GetHttpContext();
        
        // Option 1: Cookie-based (MVC app)
        if (!httpContext.User.Identity?.IsAuthenticated ?? true)
            return false;
        
        return httpContext.User.IsInRole("Admin") || 
               httpContext.User.IsInRole("DevOps");
    }
}

// Option 2: IP-based restriction (internal network only)
public class IpRestrictionFilter : IDashboardAuthorizationFilter
{
    private readonly (IPAddress Network, int PrefixLength)[] _allowedRanges =
    {
        (IPAddress.Parse("10.0.0.0"), 8),
        (IPAddress.Parse("192.168.0.0"), 16)
    };
    
    public bool Authorize(DashboardContext context)
    {
        var httpContext = context.GetHttpContext();
        var remoteIp = httpContext.Connection.RemoteIpAddress;
        
        if (remoteIp == null) return false;
        
        // IPv4-mapped IPv6 normalize
        if (remoteIp.IsIPv4MappedToIPv6)
            remoteIp = remoteIp.MapToIPv4();
        
        return IsInAllowedRange(remoteIp);
    }
    
    private bool IsInAllowedRange(IPAddress ip)
    {
        foreach (var (network, prefixLength) in _allowedRanges)
        {
            var networkBytes = network.GetAddressBytes();
            var ipBytes = ip.GetAddressBytes();
            if (networkBytes.Length != ipBytes.Length) continue;
            
            var maskBytes = prefixLength / 8;
            var remainBits = prefixLength % 8;
            
            bool match = true;
            for (int i = 0; i < maskBytes && match; i++)
                match = networkBytes[i] == ipBytes[i];
            
            if (match && remainBits > 0)
            {
                var mask = (byte)(0xFF << (8 - remainBits));
                match = (networkBytes[maskBytes] & mask) == (ipBytes[maskBytes] & mask);
            }
            
            if (match) return true;
        }
        return false;
    }
}

| **Maliyet** | Varsa bedava | Hangfire Pro lisansı (~$500/yıl) | Bedava |

| **Throughput** | ~1K/s | ~10K+/s | ~2-3K/s |
| **Reliability** | ⭐⭐⭐⭐⭐ | ⭐⭐⭐⭐ | ⭐⭐⭐ |
| **Resmi destek** | ✅ | ✅ | ❌ (community) |
| **Kurulum kolaylığı** | Kolay | Orta | Kolay |
| **Ne zaman** | Başlangıç, kurumsal | Yüksek hacim, düşük latency | PG-only altyapı |

### SQL Server Konfigürasyonu

\`\`\`csharp
builder.Services.AddHangfire(config => config
    .UseSqlServerStorage(connectionString, new SqlServerStorageOptions
    {
        CommandBatchMaxTimeout = TimeSpan.FromMinutes(5),
        SlidingInvisibilityTimeout = TimeSpan.FromMinutes(5),
        QueuePollInterval = TimeSpan.Zero,                  // Long-polling (SlidingInvisibility ile birlikte)
        UseRecommendedIsolationLevel = true,                // ReadCommitted
        DisableGlobalLocks = true,                          // Schema 7+ gerektirir
        TryAutoDetectSchemaDependentOptions = true,         // 1.8: Schema'ya göre otomatik optimizasyon
        SchemaName = "hangfire",                            // İzole schema
        PrepareSchemaIfNecessary = true                     // Auto-migration
    }));
\`\`\`

> ⚠️ **SqlClient seçimi:** Hangfire 1.8, varsayılan olarak \`Microsoft.Data.SqlClient\` kullanır. Eski projelerde \`System.Data.SqlClient\` referansı varsa her ikisi de desteklenir — Hangfire otomatik algılar. Explicit seçim gerekiyorsa: \`SqlClientFactory = Microsoft.Data.SqlClient.SqlClientFactory.Instance\`

| Kriter | Ayrı DB | Aynı DB + Schema | Neden Önemli |
|--------|---------|-------------------|--------------|
| **Backup/Restore** | ✅ Bağımsız | ⚠️ App ile birlikte | Hangfire DB restore'u app data'yı etkilemez |
| **Connection Pool** | ✅ İzole | ❌ Paylaşımlı | Worker spike'ı app pool'u tüketebilir |
| **Disk I/O** | ✅ Farklı disk/volume | ❌ Aynı disk | Job polling + state update yoğun write |
| **Operasyonel basitlik** | ⚠️ 2 DB yönetimi | ✅ Tek DB | Küçük ekiplerde overhead |
| **Compliance / audit** | ✅ Data ayrımı net | ⚠️ Karışık | GDPR: job arg'larda PII olabilir |
| **Transaction scope** | ❌ Distributed TX gerekir | ✅ Aynı TX'te enqueue | "Kaydet + job at" atomic olsun |

> ⚠️ **Anti-Pattern:** Hangfire tablolarını app schema'sında (dbo) bırakmak. EF Core migration'ları Hangfire tablolarını "unknown table" olarak algılar ve silmeye çalışabilir. **Mutlaka** \`SchemaName\` belirtin.

> 💡 **Gerçek hayat senaryosu:** Bir fintech'te Hangfire aynı DB'deydi. Black Friday'de 50K job enqueue edilince connection pool tükendi (default 100), app 503 vermeye başladı. Çözüm: Hangfire'ı ayrı DB'ye taşıyıp dedicated pool (Max Pool Size=150) tanımladılar. App pool'u 100'de kaldı, sıfır downtime.

> 💡 **Gerçek hayat senaryosu:** Bir e-ticaret sitesi başlangıçta SQL Server storage ile başladı (zaten MSSQL kullanıyor). Günlük 10K job sorunsuz. Black Friday'de 100K+ job/gün gerekince Redis storage'a geçiş yaptılar — zero downtime migration: eski job'lar SQL'de tamamlandı, yeniler Redis'e yazıldı.

### Anti-Pattern vs Doğru Kullanım

\`\`\`csharp
// ❌ YANLIŞ: Büyük nesne serialize edilir, storage şişer
BackgroundJob.Enqueue<IReportService>(svc => svc.Generate(new ReportRequest
{
    Data = hugeDataList,          // MB'larca veri job storage'da!
    Template = complexTemplate
}));

// ✅ DOĞRU: Sadece ID, job içinde veriyi çek
BackgroundJob.Enqueue<IReportService>(svc => svc.GenerateByRequestId(requestId));
\`\`\`

\`\`\`csharp
// ❌ YANLIŞ: HttpContext capture — job çalışırken context yok!
BackgroundJob.Enqueue(() => ProcessRequest(HttpContext.Request.Body));

// ✅ DOĞRU: Gerekli veriyi önce çıkar, sadece değeri geç
var userId = HttpContext.User.FindFirst(ClaimTypes.NameIdentifier)?.Value;
BackgroundJob.Enqueue<IUserService>(svc => svc.ProcessAsync(userId));
\`\`\`

\`\`\`csharp
// ❌ YANLIŞ: Non-idempotent — retry'da müşteriye 2x para çekilir
public async Task ChargeCustomerAsync(int orderId)
{
    var order = await _repo.GetAsync(orderId);
    await _paymentGateway.Charge(order.Amount, order.CardToken);
}

// ✅ DOĞRU: Idempotency key ile korunmuş
public async Task ChargeCustomerAsync(int orderId)
{
    var order = await _repo.GetAsync(orderId);
    
    // Zaten charged ise skip
    if (order.PaymentStatus == PaymentStatus.Charged)
        return;
    
    // Gateway idempotency key
    var idempotencyKey = "order-charge-" + orderId;
    await _paymentGateway.Charge(order.Amount, order.CardToken, idempotencyKey);
    
    order.PaymentStatus = PaymentStatus.Charged;
    await _repo.UpdateAsync(order);
}
\`\`\`

### Queue İzolasyonu

\`\`\`csharp
// Queue tanımı (priority order)
builder.Services.AddHangfireServer(options =>
{
    options.Queues = new[] { "critical", "default", "low" };
    // Worker'lar önce "critical" queue'u işler
});

// Kullanım
[Queue("critical")]
public async Task ProcessPaymentAsync(int paymentId) { ... }

[Queue("low")]
public async Task SendAnalyticsAsync(int eventId) { ... }

// Veya enqueue sırasında
BackgroundJob.Enqueue<IPaymentService>(
    svc => svc.ProcessAsync(paymentId), "critical");
\`\`\`

### Job Timeout (CancellationToken)

\`\`\`csharp
// Hangfire, job method'una CancellationToken inject eder.
// Server ShutdownTimeout veya job iptal edildiğinde token cancel olur.
[AutomaticRetry(Attempts = 2)]
public async Task ImportLargeFileAsync(int fileId, CancellationToken cancellationToken)
{
    // CancellationToken'ı her adımda kontrol et
    foreach (var batch in GetBatches(fileId))
    {
        cancellationToken.ThrowIfCancellationRequested();
        await ProcessBatchAsync(batch, cancellationToken);
    }
}

// Custom timeout: belirli sürede bitmeyen job'ı iptal et
public async Task ProcessWithTimeoutAsync(int id, CancellationToken cancellationToken)
{
    using var cts = CancellationTokenSource.CreateLinkedTokenSource(cancellationToken);
    cts.CancelAfter(TimeSpan.FromMinutes(5)); // 5 dk hard limit
    
    await DoWorkAsync(id, cts.Token);
}
\`\`\`

> 💡 **Gerçek hayat senaryosu:** Bir SaaS'ta job argümanlarında entity nesnesi geçiliyordu. 6 ay sonra entity'ye yeni required property eklenince, queue'daki tüm eski job'lar deserialization hatası ile Failed oldu. ID-based yaklaşım bu sorunu tamamen önler.

### 🔥 Development'ta Shared Storage Sorunu

Bu, Hangfire kullanan hemen her ekipte yaşanan en sinir bozucu sorundur:

> ⛔ **Klasik senaryo:** Developer A bir job enqueue eder ve breakpoint koyarak debug etmeye çalışır. Ama job, aynı veritabanına bağlı Developer B'nin makinesindeki Hangfire Server tarafından alınır. A hiçbir şey göremez, B'nin konsolu beklenmedik loglarla dolar.

**Neden olur?** Tüm geliştiriciler aynı Hangfire storage'ını (shared dev DB) kullandığında, herhangi bir aktif Hangfire Server job'ı kapabilir. Hangfire "ilk gelen alır" prensibiyle çalışır.

**Çözüm stratejileri (en iyiden en kolaya):**

\`\`\`csharp
// ✅ ÇÖZÜM 1: Development'ta InMemory storage (EN İYİ)
if (builder.Environment.IsDevelopment())
{
    builder.Services.AddHangfire(config => config.UseInMemoryStorage());
}
else
{
    builder.Services.AddHangfire(config => config.UseSqlServerStorage(connectionString));
}
\`\`\`

\`\`\`csharp
// ✅ ÇÖZÜM 2: Developer başına schema/prefix izolasyonu
var devName = Environment.MachineName; // veya Environment.UserName
builder.Services.AddHangfire(config => config
    .UseSqlServerStorage(connectionString, new SqlServerStorageOptions
    {
        SchemaName = "hangfire_" + devName.ToLower()  // hangfire_erdem, hangfire_ali, ...
    }));
\`\`\`

\`\`\`csharp
// ✅ ÇÖZÜM 3: Developer-specific queue + server
var devQueue = "dev-" + Environment.MachineName.ToLower();

builder.Services.AddHangfireServer(options =>
{
    options.ServerName = Environment.MachineName;
    options.Queues = new[] { devQueue }; // Sadece kendi queue'unu dinle
});

// Enqueue sırasında kendi queue'una gönder
BackgroundJob.Enqueue<IMyService>(svc => svc.DoWork(id), devQueue);
\`\`\`

| Çözüm | Avantaj | Dezavantaj |
|-------|---------|------------|
| InMemory storage | Sıfır konfigürasyon, tam izolasyon | Dashboard yok, restart'ta job kaybolur |
| Schema per developer | Tam izolasyon, Dashboard çalışır | Her dev'e ayrı schema (auto-create) |
| Queue per developer | Tek DB, kolay geçiş | Queue discipline gerekir, hata riski |

> 💡 **Gerçek hayat senaryosu:** 8 kişilik bir backend ekibi shared dev DB kullanıyordu. Sprint'in ilk haftası 3 developer aynı bug'ı "job'ım çalışmıyor" diye raporladı. Çözüm: Development ortamında InMemory storage + environment check. 10 satır kod ile sorun tamamen ortadan kalktı. Integration test'ler için Docker'da izole SQL Server ayağa kaldırılıyor.

## Performance & Scaling <span class="level-badge level-advanced">İLERİ</span>

Hangfire, birden fazla sunucuda dağıtık çalışabilir — otomatik senkronizasyon storage üzerinden yapılır.

> ⚠️ **Seviye: İleri+** — Bu bölüm production deneyimi gerektirir.

### Ne Zaman Kullan / Kullanma

| Senaryo | ✅ Kullan | ❌ Kullanma | Gerçek Hayat |

| >1K job/gün, tek sunucu yetmiyor | ✅ Multi-server | | E-ticaret Black Friday |

### Worker Count Tuning

\`\`\`csharp
builder.Services.AddHangfireServer(options =>
{
    // CPU-bound: ProcessorCount
    // IO-bound (API calls, DB): ProcessorCount * 2-5
    // Mixed: ProcessorCount * 2 (default)
    options.WorkerCount = Environment.ProcessorCount * 3;
    
    // Queue priority
    options.Queues = new[] { "critical", "default", "low" };
    
    // Graceful shutdown timeout
    options.ShutdownTimeout = TimeSpan.FromSeconds(30);
    options.StopTimeout = TimeSpan.FromSeconds(15);
    
    // Server check interval
    options.HeartbeatInterval = TimeSpan.FromSeconds(30);
    options.ServerCheckInterval = TimeSpan.FromMinutes(5);
    options.ServerTimeout = TimeSpan.FromMinutes(5);
    
    // Schedule polling interval
    options.SchedulePollingInterval = TimeSpan.FromSeconds(15);
});
\`\`\`

### Multi-Server Deployment

\`\`\`csharp
// Ayrı server'lar farklı queue'lara odaklanabilir

// Server A — Critical jobs only (düşük latency)
builder.Services.AddHangfireServer(options =>
{
    options.ServerName = "critical-worker";
    options.Queues = new[] { "critical" };
    options.WorkerCount = 10;
});

// Server B — Default + Low priority (throughput)
builder.Services.AddHangfireServer(options =>
{
    options.ServerName = "bulk-worker";
    options.Queues = new[] { "default", "low" };
    options.WorkerCount = 40;
});
\`\`\`

### SQL Server Polling Optimization

\`\`\`csharp
// ÖNERİLEN: SlidingInvisibilityTimeout ayarlıysa TimeSpan.Zero kullanın
// Bu durumda Hangfire long-polling yapar (DB WAITFOR), polling gereksiz
new SqlServerStorageOptions
{
    QueuePollInterval = TimeSpan.Zero,              // Long-polling (en iyi latency, en az DB load)
    SlidingInvisibilityTimeout = TimeSpan.FromMinutes(5),
    TryAutoDetectSchemaDependentOptions = true,     // Schema 7'de otomatik aktif
    
    // Connection pool büyütün
    // ConnectionString'e: "Max Pool Size=100"
}
\`\`\`

| Parametre | Varsayılan | IO-Ağırlıklı | CPU-Ağırlıklı |
|-----------|-----------|--------------|---------------|
| WorkerCount | CPU * 5 | CPU * 4 | CPU |
| QueuePollInterval | Zero (long-poll) | Zero | Zero |
| SlidingInvisibility | 5m | 5m | 10m |
| ShutdownTimeout | 15s | 30s | 60s |

> 💡 **Gerçek hayat senaryosu:** Bir e-ticaret platformunda Black Friday için: 1 critical-worker (ödemeler, 10 worker), 3 bulk-worker (e-postalar, bildirimler, 40 worker each). Toplam 130 worker, tek SQL Server instance üzerinden koordineli çalışıyor — zero configuration distributed processing.

### Health Check Integration

\`\`\`csharp
// NuGet: AspNetCore.HealthChecks.Hangfire
builder.Services.AddHealthChecks()
    .AddHangfire(options =>
    {
        options.MinimumAvailableServers = 1;
        options.MaximumJobsFailed = 50;
    }, name: "hangfire", tags: new[] { "ready" });

// Custom health check — queue depth
public class HangfireQueueHealthCheck : IHealthCheck
{
    public Task<HealthCheckResult> CheckHealthAsync(
        HealthCheckContext context, CancellationToken ct = default)
    {
        var monitor = JobStorage.Current.GetMonitoringApi();
        var queues = monitor.Queues();
        var totalEnqueued = queues.Sum(q => q.Length);
        
        if (totalEnqueued > 10000)
            return Task.FromResult(HealthCheckResult.Unhealthy(
                "Queue depth too high: " + totalEnqueued));
        
        if (totalEnqueued > 5000)
            return Task.FromResult(HealthCheckResult.Degraded(
                "Queue depth elevated: " + totalEnqueued));
        
        return Task.FromResult(HealthCheckResult.Healthy(
            "Queued: " + totalEnqueued));
    }
}
\`\`\`

### Prometheus Metrics via Filter

> ⚠️ **Hangfire native Prometheus endpoint sunmaz.** Aşağıdaki \`PrometheusMetricsFilter\` custom bir çözümdür — \`prometheus-net\` NuGet paketi gerektirir. Grafana dashboard'undaki metrik adları (\`hangfire_jobs_processed_total\` vb.) bu filter'dan gelir, Hangfire'dan değil.

\`\`\`csharp
public class PrometheusMetricsFilter : JobFilterAttribute, IServerFilter, IElectStateFilter
{
    private static readonly Counter JobsProcessed = Metrics.CreateCounter(
        "hangfire_jobs_processed_total", "Total processed jobs",
        new CounterConfiguration { LabelNames = new[] { "job_type", "status" } });

    private static readonly Histogram JobDuration = Metrics.CreateHistogram(
        "hangfire_job_duration_seconds", "Job execution duration",
        new HistogramConfiguration
        {
            LabelNames = new[] { "job_type" },
            Buckets = new[] { 0.1, 0.5, 1, 5, 10, 30, 60, 120, 300 }
        });

    private static readonly Gauge QueueDepth = Metrics.CreateGauge(
        "hangfire_queue_depth", "Current queue depth",
        new GaugeConfiguration { LabelNames = new[] { "queue" } });

    public void OnPerforming(PerformingContext context)
    {
        context.Items["StartTime"] = Stopwatch.StartNew();
    }

    public void OnPerformed(PerformedContext context)
    {
        if (context.Items.TryGetValue("StartTime", out var obj) && obj is Stopwatch sw)
        {
            sw.Stop();
            var jobType = context.BackgroundJob.Job.Type.Name;
            JobDuration.WithLabels(jobType).Observe(sw.Elapsed.TotalSeconds);
        }
    }

    public void OnStateElection(ElectStateContext context)
    {
        var jobType = context.BackgroundJob.Job.Type.Name;
        if (context.CandidateState is SucceededState)
            JobsProcessed.WithLabels(jobType, "succeeded").Inc();
        else if (context.CandidateState is FailedState)
            JobsProcessed.WithLabels(jobType, "failed").Inc();
    }
}

// Global registration
GlobalJobFilters.Filters.Add(new PrometheusMetricsFilter());
\`\`\`

\`\`\`csharp
// Tamamlanan job'ların ne kadar süre saklanacağını ayarlayın

builder.Services.AddHangfire(config => config
    .UseSqlServerStorage(connectionString, new SqlServerStorageOptions
    {
        SchemaName = "hangfire",

// Job bazında retention (💰 Hangfire Pro — ücretli)

// Community'de sadece global expiration (1 gün) geçerlidir, değiştirilemez.

public async Task GenerateReportAsync(int reportId) { ... }

### Conditional Server Registration

\`\`\`csharp
// Program.cs — aynı codebase, farklı roller
var runServer = builder.Configuration.GetValue<bool>("Hangfire:RunServer");
var enableDashboard = builder.Configuration.GetValue<bool>("Hangfire:EnableDashboard");

builder.Services.AddHangfire(config => config
    .UseSqlServerStorage(builder.Configuration.GetConnectionString("HangfireConnection")));

if (runServer)
{
    builder.Services.AddHangfireServer(options =>
    {
        options.WorkerCount = builder.Configuration.GetValue<int>("Hangfire:WorkerCount", 20);
        options.Queues = builder.Configuration.GetSection("Hangfire:Queues")
            .Get<string[]>() ?? new[] { "default" };
        options.ShutdownTimeout = TimeSpan.FromSeconds(30);
    });
}

var app = builder.Build();

if (enableDashboard)
{
    app.UseHangfireDashboard("/hangfire", new DashboardOptions
    {
        Authorization = new[] { new HangfireAuthorizationFilter() },

### Graceful Shutdown

\`\`\`csharp
// Worker container SIGTERM aldığında:
// 1. Yeni job kabul etmeyi durdurur
// 2. Mevcut job'ların tamamlanmasını bekler (ShutdownTimeout kadar)
// 3. Timeout dolarsa in-flight job'lar "Processing" state'te kalır
// 4. SlidingInvisibilityTimeout sonra başka server tarafından alınır

builder.Services.AddHangfireServer(options =>
{
    options.ShutdownTimeout = TimeSpan.FromSeconds(30);  // Max bekleme
    options.StopTimeout = TimeSpan.FromSeconds(15);       // Stop sinyali timeout
});

// Kubernetes: terminationGracePeriodSeconds > ShutdownTimeout olmalı
// terminationGracePeriodSeconds: 45 (ShutdownTimeout + buffer)
\`\`\`

### Rolling Update Strategy

\`\`\`yaml
# Kubernetes deployment
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # Hiçbir zaman 0 worker olmasın
  template:
    spec:
      terminationGracePeriodSeconds: 45
      containers:
      - name: hangfire-worker
        lifecycle:
          preStop:
            exec:
              command: ["sleep", "5"]  # Load balancer drain süresi
\`\`\`

> 💡 **Gerçek hayat senaryosu:** Deployment sırasında in-flight job kaybı: Eski pod kill ediliyor ama 2 dakikalık job devam ediyor. Çözüm: ShutdownTimeout=120s + terminationGracePeriodSeconds=135s. Pod, işi bitirene kadar bekler. Bitmezse job "Processing" state'te kalır ve SlidingInvisibilityTimeout sonra başka worker tarafından tekrar alınır (idempotent olmalı!).

    // ===== RENDERING ENGINE =====
    const renderer = new marked.Renderer();
    
    renderer.code = function({ text, lang }) {
        const language = lang || 'plaintext';
        let highlighted;
        try {
            highlighted = hljs.highlight(text, { language }).value;
        } catch {
            highlighted = hljs.highlightAuto(text).value;
        }
        return '<div class="code-wrapper"><button class="copy-btn" onclick="copyCode(this)">Kopyala</button><pre><code class="hljs language-' + language + '">' + highlighted + '</code></pre></div>';
    };

    renderer.blockquote = function({ tokens }) {
        const raw = this.parser.parse(tokens);
        if (raw.includes('⚠️') || raw.includes('Uyarı') || raw.includes('DİKKAT'))
            return '<div class="callout callout-warn">' + raw + '</div>';
        if (raw.includes('💡') || raw.includes('İpucu') || raw.includes('Gerçek hayat'))
            return '<div class="callout callout-tip">' + raw + '</div>';
        if (raw.includes('⛔') || raw.includes('Tehlike') || raw.includes('YANLIŞ'))
            return '<div class="callout callout-danger">' + raw + '</div>';
        if (raw.includes('🔗') || raw.includes('İlgili'))
            return '<div class="callout callout-info">' + raw + '</div>';
        return '<blockquote>' + raw + '</blockquote>';
    };

    renderer.heading = function({ tokens, depth }) {
        const text = this.parser.parseInline(tokens);
        const clean = text.replace(/<[^>]*>/g, '').trim();
        const id = clean.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-');
        if (depth === 1) {
            const cls = text.includes('TEMEL') ? 'level-divider-basic' : text.includes('ORTA') ? 'level-divider-mid' : text.includes('İLERİ') ? 'level-divider-advanced' : text.includes('UZMAN') ? 'level-divider-expert' : '';
            return '<h1 id="' + id + '" class="' + cls + '">' + text + '</h1>';
        }
        return '<h' + depth + ' id="' + id + '">' + text + '</h' + depth + '>';
    };

    marked.setOptions({ renderer, breaks: false, gfm: true });
    
    document.getElementById('content').innerHTML = marked.parse(MARKDOWN_CONTENT);

    // ===== TOC GENERATION =====
    function buildTOC() {
        const headings = document.querySelectorAll('.content h2, .content h3');
        const container = document.getElementById('tocLinks');
        const groups = [];
        let currentGroup = null;

        headings.forEach(h => {
            if (h.tagName === 'H2') {
                currentGroup = { heading: h, items: [] };
                groups.push(currentGroup);
            } else if (h.tagName === 'H3' && currentGroup) {
                currentGroup.items.push(h);
            }
        });

        container.innerHTML = groups.map((g, i) => {
            const text = g.heading.textContent.replace(/TEMEL|ORTA|İLERİ|UZMAN/g, '').trim();
            const id = g.heading.id;
            const dot = g.heading.innerHTML.includes('level-basic') ? '#34d399' : g.heading.innerHTML.includes('level-mid') ? '#c4a44e' : g.heading.innerHTML.includes('level-advanced') ? '#fb923c' : g.heading.innerHTML.includes('level-expert') ? '#c76a6a' : '#7c5cbf';
            const subs = g.items.map(it => '<a href="#' + it.id + '" class="toc-sub-item" data-target="' + it.id + '">' + it.textContent.trim() + '</a>').join('');
            return '<div class="toc-group"><div class="toc-group-header" onclick="toggleGroup(this)" data-group="' + i + '"><span class="toc-chevron">▼</span><span class="toc-dot" style="background:' + dot + '"></span>' + text + '<span class="toc-count">' + g.items.length + '</span></div><div class="toc-group-items" style="max-height:' + ((g.items.length + 1) * 34 + 10) + 'px"><a href="#' + id + '" data-target="' + id + '">' + text + '</a>' + subs + '</div></div>';
        }).join('');
    }
    buildTOC();

    // ===== SCROLL SPY =====
    function scrollSpy() {
        const links = document.querySelectorAll('.sidebar a[data-target]');
        const headings = Array.from(document.querySelectorAll('.content h2, .content h3'));
        const scrollY = window.scrollY + 100;
        let current = '';
        headings.forEach(h => { if (h.offsetTop <= scrollY) current = h.id; });
        links.forEach(l => { l.classList.toggle('active', l.dataset.target === current); });
        // scroll progress
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = docHeight > 0 ? window.scrollY / docHeight : 0;
        document.getElementById('scrollProgress').style.transform = 'scaleX(' + progress + ')';
        // back to top
        document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 500);
    }
    window.addEventListener('scroll', scrollSpy, { passive: true });
    scrollSpy();

    // ===== TOC GROUP TOGGLE =====
    function toggleGroup(header) {
        const items = header.nextElementSibling;
        header.classList.toggle('collapsed');
        items.classList.toggle('collapsed');
    }

    // ===== SEARCH =====
    function handleSearch(query) {
        const panel = document.getElementById('searchResults');
        if (!query || query.length < 2) { panel.classList.remove('open'); panel.innerHTML = ''; return; }
        const headings = document.querySelectorAll('.content h2, .content h3');
        const results = [];
        const q = query.toLowerCase();
        headings.forEach(h => {
            const text = h.textContent.toLowerCase();
            if (text.includes(q)) results.push({ el: h, text: h.textContent.trim() });
        });
        // Search in paragraphs
        document.querySelectorAll('.content p, .content li, .content td').forEach(el => {
            if (results.length >= 15) return;
            const text = el.textContent.toLowerCase();
            if (text.includes(q)) {
                const section = el.closest('h2, h3') || findPrevHeading(el);
                if (section) results.push({ el: section, text: el.textContent.trim().substring(0, 80) + '...', section: section.textContent.trim() });
            }
        });
        if (results.length === 0) { panel.innerHTML = '<div class="search-info">Sonuç bulunamadı</div>'; panel.classList.add('open'); return; }
        panel.innerHTML = results.slice(0, 12).map(r => '<a class="search-result-item" href="#' + (r.el.id || '') + '" onclick="closeSearch()"><span class="result-section">' + (r.section || r.text) + '</span><span class="result-snippet">' + r.text.replace(new RegExp('(' + query + ')', 'gi'), '<mark>$1</mark>') + '</span></a>').join('');
        panel.classList.add('open');
    }
    function findPrevHeading(el) {
        let node = el.previousElementSibling;
        while (node) { if (node.tagName === 'H2' || node.tagName === 'H3') return node; node = node.previousElementSibling; }
        return el.closest('section') || document.querySelector('.content h2');
    }
    function closeSearch() { document.getElementById('searchResults').classList.remove('open'); document.getElementById('tocSearch').value = ''; }
    document.addEventListener('keydown', e => { if (e.key === '/' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); document.getElementById('tocSearch').focus(); } if (e.key === 'Escape') closeSearch(); });

    // ===== THEME TOGGLE =====
    function toggleTheme() {
        const body = document.body;
        const current = body.getAttribute('data-theme');
        const next = current === 'light' ? null : 'light';
        if (next) body.setAttribute('data-theme', next); else body.removeAttribute('data-theme');
        document.getElementById('themeToggle').textContent = next === 'light' ? '☀️' : '🌙';
        localStorage.setItem('theme', next || 'dark');
    }
    (function() { const saved = localStorage.getItem('theme'); if (saved === 'light') { document.body.setAttribute('data-theme', 'light'); document.getElementById('themeToggle').textContent = '☀️'; } })();

    // ===== COPY CODE =====
    function copyCode(btn) {
        const code = btn.nextElementSibling.querySelector('code').textContent;
        navigator.clipboard.writeText(code).then(() => { btn.textContent = '✓ Kopyalandı'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 2000); });
    }
